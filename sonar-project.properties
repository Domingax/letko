# SonarCloud Configuration
# To configure: create a project at https://sonarcloud.io, then replace the placeholder values below.

sonar.organization=PLACEHOLDER_ORG
sonar.projectKey=PLACEHOLDER_KEY

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=**/*.test.ts,**/*.test.tsx,src/test-setup.ts
